---

- name: Get the user with UID 1000
  command: "id -nu 1000"
  register: current_uid_1000_user
  failed_when: false
  changed_when: false

- name: Show the user with UID 1000
  debug:
    msg: "The UID 1000 is owned by user: {{ current_uid_1000_user.stdout }}"
  when: current_uid_1000_user.rc == 0

- name: Set grimoire_user and grimoire_group facts based on UID 1000 ownership
  set_fact:
    grimoire_user: "{{ current_uid_1000_user.stdout }}"
    grimoire_group: 1000
    grimoire_user_ssh_key: false
  when: current_uid_1000_user.rc == 0

- name: Create group grimoire
  group:
    name: "{{ grimoire_group }}"
    state: present
  when: current_uid_1000_user.rc != 0

- name: Create user grimoire
  user:
    name: "{{ grimoire_user }}"
    groups: "{{ grimoire_group }}"
    uid: 1000
    generate_ssh_key: yes
    ssh_key_bits: 4096
    ssh_key_file: .ssh/id_rsa
  when: current_uid_1000_user.rc != 0

- name: Configure Mordred
  import_tasks: configure.yml

- name: "Create a docker network: {{ docker_network_name }}"
  docker_network:
    name: "{{ docker_network_name }}"

- name: Remove old Mordred container(s)
  docker_container:
    name: "mordred_{{ item.project }}"
    state: absent
  with_items:
    - "{{ instances }}"
  delegate_to: "{{ groups['all_in_one'][0] | default(groups['mordred'][item.mordred.host]) }}"
  run_once: true
  no_log: true

- name: docker
  docker_container:
    name: "mordred_{{ item.project }}"
    image: "{{ bap_docker_image }}:{{ bap_version }}"
    networks:
      - name: "{{ docker_network_name }}"
        aliases:
          - "mordred-{{ item.project }}"
    volumes:
    - "{{ mordred_ssh_dir }}:/home/grimoire/.ssh/"
    - "{{ mordred_setups_dir }}/{{ item.project }}/setup.cfg:/home/grimoire/conf/setup.cfg"
    - "{{ mordred_instances_dir }}/{{ item.project }}/conf/:/home/grimoire/conf/"
    - "{{ mordred_instances_dir }}/{{ item.project }}/sources/:/home/grimoire/data-sources/"
    - "{{ mordred_instances_dir }}/{{ item.project }}/logs/:/home/grimoire/logs/"
    - "{{ mordred_instances_dir }}/{{ item.project }}/perceval-cache/:/home/grimoire/.perceval/"
    log_driver: json-file
    log_options:
      max-size: "{{ docker_log_max_size }}"
  with_items:
    - "{{ instances }}"
  delegate_to: "{{ groups['all_in_one'][0] | default(groups['mordred'][item.mordred.host]) }}"
  run_once: true
  no_log: true
